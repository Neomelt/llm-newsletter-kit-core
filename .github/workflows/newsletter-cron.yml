name: Newsletter Cron

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

concurrency:
  group: newsletter-cron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      NEWS_MODEL: deepseek-chat
      OUTPUT_LANGUAGE: Chinese
      NEWSLETTER_BRAND: Neomelt Tech Radar
      TITLE_CONTEXT: 本周 AI 与机器人动态
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare playground input files
        shell: bash
        run: |
          mkdir -p playground/data
          cp playground/data-examples/template.example.html playground/data/template.html

      - name: Build AI/Robotics article pool from RSS
        shell: bash
        run: |
          python3 playground/build_articles_from_rss.py playground/data/articles.json 50
          test -s playground/data/articles.json || (echo "articles.json is empty" && exit 1)

      - name: Build runtime config
        shell: bash
        run: |
          test -n "$DEEPSEEK_API_KEY" || (echo "DEEPSEEK_API_KEY is missing" && exit 1)
          today_iso=$(date -u +%F)
          cat > playground/data/config.json <<EOF
          {
            "provider": "openai",
            "apiKey": "${DEEPSEEK_API_KEY}",
            "baseURL": "${DEEPSEEK_BASE_URL}",
            "model": "${NEWS_MODEL}",
            "outputLanguage": "${OUTPUT_LANGUAGE}",
            "expertField": ["AI", "Robotics", "Autonomous Driving"],
            "freeFormIntro": true,
            "titleContext": "${TITLE_CONTEXT}",
            "newsletterBrandName": "${NEWSLETTER_BRAND}",
            "subscribePageUrl": "",
            "displayDate": "${today_iso}",
            "isoDate": "${today_iso}",
            "maxRetries": 2,
            "templateMarkers": {
              "title": "title",
              "content": "content"
            }
          }
          EOF

      - name: Generate newsletter
        shell: bash
        run: |
          set -e
          if npm run playground:generate-newsletter; then
            echo "generation succeeded with ${NEWS_MODEL}"
          else
            echo "LLM generation failed, generating deterministic fallback newsletter"
            python3 playground/fallback_generate_newsletter.py
          fi

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output-${{ github.run_number }}
          path: |
            playground/output/newsletter.md
            playground/output/newsletter.html
            playground/output/usage.md

      - name: Add summary
        shell: bash
        run: |
          echo "## Newsletter generated" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${NEWS_MODEL}" >> $GITHUB_STEP_SUMMARY
          echo "- Language: ${OUTPUT_LANGUAGE}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: newsletter-output-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Feishu
        if: always()
        shell: bash
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK missing, skip notify"
            exit 0
          fi
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="[Newsletter Cron] ${STATUS}\nRepo: ${{ github.repository }}\nRun: ${RUN_URL}"
          payload=$(python3 -c 'import json,os;print(json.dumps({"msg_type":"text","content":{"text":os.environ["TEXT"]}}, ensure_ascii=False))')
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' -d "$payload"
