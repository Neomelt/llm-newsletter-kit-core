name: Newsletter Cron

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

concurrency:
  group: newsletter-cron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      NEWS_MODEL: deepseek-chat
      OUTPUT_LANGUAGE: Chinese
      NEWSLETTER_BRAND: Neomelt Tech Radar
      TITLE_CONTEXT: 本周 AI 与机器人动态
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare playground input files
        shell: bash
        run: |
          mkdir -p playground/data
          cp playground/data-examples/template.example.html playground/data/template.html

      - name: Build AI/Robotics article pool from RSS
        shell: bash
        run: |
          python3 playground/build_articles_from_rss.py playground/data/articles.json 50
          test -s playground/data/articles.json || (echo "articles.json is empty" && exit 1)

      - name: Build runtime config
        shell: bash
        run: |
          test -n "$DEEPSEEK_API_KEY" || (echo "DEEPSEEK_API_KEY is missing" && exit 1)
          today_iso=$(date -u +%F)
          cat > playground/data/config.json <<EOF
          {
            "provider": "openai",
            "apiKey": "${DEEPSEEK_API_KEY}",
            "baseURL": "${DEEPSEEK_BASE_URL}",
            "model": "${NEWS_MODEL}",
            "outputLanguage": "${OUTPUT_LANGUAGE}",
            "expertField": ["AI", "Robotics", "Autonomous Driving"],
            "freeFormIntro": true,
            "titleContext": "${TITLE_CONTEXT}",
            "newsletterBrandName": "${NEWSLETTER_BRAND}",
            "subscribePageUrl": "",
            "displayDate": "${today_iso}",
            "isoDate": "${today_iso}",
            "maxRetries": 2,
            "templateMarkers": {
              "title": "title",
              "content": "content"
            }
          }
          EOF

      - name: Generate newsletter
        shell: bash
        run: |
          set -e
          if npm run playground:generate-newsletter; then
            echo "generation succeeded with ${NEWS_MODEL}"
          else
            echo "LLM generation failed, generating deterministic fallback newsletter"
            python3 playground/fallback_generate_newsletter.py
          fi

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output-${{ github.run_number }}
          path: |
            playground/output/newsletter.md
            playground/output/newsletter.html
            playground/output/usage.md

      - name: Add summary
        shell: bash
        run: |
          echo "## Newsletter generated" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${NEWS_MODEL}" >> $GITHUB_STEP_SUMMARY
          echo "- Language: ${OUTPUT_LANGUAGE}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: newsletter-output-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Feishu (card)
        if: always()
        shell: bash
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK missing, skip notify"
            exit 0
          fi

          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO="${{ github.repository }}"

          PROVIDER="unknown"
          MODEL="unknown"
          if [ -f playground/output/usage.md ]; then
            PROVIDER=$(grep -E '^\| Provider \|' playground/output/usage.md | awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $3); print $3}')
            MODEL=$(grep -E '^\| Model \|' playground/output/usage.md | awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $3); print $3}')
          fi

          if [ "$PROVIDER" = "fallback" ]; then
            MODE_TEXT="降级模式（RSS基础聚合）"
            TEMPLATE_COLOR="orange"
          else
            MODE_TEXT="LLM生成模式"
            TEMPLATE_COLOR="green"
          fi

          if [ "$STATUS" != "success" ]; then
            TEMPLATE_COLOR="red"
          fi

          export STATUS RUN_URL REPO PROVIDER MODEL MODE_TEXT TEMPLATE_COLOR
          payload=$(python3 - <<'PY'
import json, os
payload = {
  "msg_type": "interactive",
  "card": {
    "config": {"wide_screen_mode": True},
    "header": {
      "template": os.environ.get("TEMPLATE_COLOR", "blue"),
      "title": {"tag": "plain_text", "content": "AI+Robotics Newsletter 任务通知"}
    },
    "elements": [
      {"tag": "div", "text": {"tag": "lark_md", "content": f"**状态**：`{os.environ.get('STATUS','unknown')}`\n**模式**：{os.environ.get('MODE_TEXT','unknown')}"}},
      {"tag": "div", "text": {"tag": "lark_md", "content": f"**Provider**：{os.environ.get('PROVIDER','unknown')}\n**Model**：{os.environ.get('MODEL','unknown')}"}},
      {"tag": "action", "actions": [
        {"tag": "button", "text": {"tag": "plain_text", "content": "查看运行日志"}, "type": "primary", "url": os.environ.get("RUN_URL", "")}
      ]},
      {"tag": "note", "elements": [
        {"tag": "plain_text", "content": f"Repo: {os.environ.get('REPO','')}"}
      ]}
    ]
  }
}
print(json.dumps(payload, ensure_ascii=False))
PY
)
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' -d "$payload"
